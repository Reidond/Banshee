name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: check (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace

  arm64-build:
    name: build (arm64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      # Full build (link included): the arm64 vt static lib is vendored, and
      # windows-latest ships the x64-hosted ARM64 MSVC cross linker. This is
      # the M0 "ARM64 must link" gate running on every PR.
      - name: cargo build --target aarch64-pc-windows-msvc
        run: cargo build --workspace --target aarch64-pc-windows-msvc
