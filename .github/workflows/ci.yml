name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: check (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace

  arm64-build:
    name: build (arm64, check-only until arm64 vt lib is vendored)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      # TODO(M0 exit): flip `check` back to `build` once the vendor-vt workflow
      # has produced and committed vendor/ghostty-vt/lib/arm64/ — bins cannot
      # link ARM64 without it. `check` still proves the whole workspace
      # compiles for aarch64; the vendored-lib link proof lives in vendor-vt.yml.
      - name: cargo check --target aarch64-pc-windows-msvc
        run: cargo check --workspace --target aarch64-pc-windows-msvc
