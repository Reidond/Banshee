name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: check (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace

  arm64-build:
    name: build (arm64, link-only)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - name: cargo build --target aarch64-pc-windows-msvc
        run: cargo build --workspace --target aarch64-pc-windows-msvc
