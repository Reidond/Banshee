# vendor-manifest.toml — pins for `cargo xtask vendor-vt` (UC-01).
#
# FORMAT: intentionally minimal so xtask parses it with std only (no toml crate).
#   - One `key = "value"` per line. Whitespace around `=` is ignored.
#   - `#` starts a comment (whole-line or trailing).
#   - A line that is exactly the section header (in brackets) scopes the keys
#     under it. The artifacts section is REWRITTEN by xtask on every successful
#     vendor run (produced checksums + byte sizes). Everything above it is
#     hand-pinned and read-only to the tool.
#   - `source-sha256 = "TOFU"` triggers trust-on-first-use: xtask computes the
#     tarball hash on the first run and writes it back here. Subsequent runs
#     verify against the recorded hash and abort on mismatch (UC-01 E2).
#
# All pins below were verified from primary sources on 2026-07-03.

# --- ghostty upstream (the vt library we vendor) ---
ghostty-commit  = "d560c645488d158c3e554e13025c0eaad68d1f43"  # main, 2026-07-03
ghostty-date    = "2026-07-03"
source-url      = "https://codeload.github.com/ghostty-org/ghostty/tar.gz/d560c645488d158c3e554e13025c0eaad68d1f43"
source-sha256   = "95f6df167c3c02be2a0db8e6b88f83f581bb073a53f533a26f41941e7adef397"

# --- Zig host toolchain (CI-only; contributors never need Zig) ---
zig-version     = "0.15.2"  # ghostty's minimum_zig_version at the pinned commit
zig-url         = "https://ziglang.org/download/0.15.2/zig-x86_64-windows-0.15.2.zip"
zig-sha256      = "3a0ed1e8799a2f8ce2a6e6290a9ff22e6906f8227865911fb7ddedc3cc14cb0c"

# --- build invocation (cross-compiled by Zig from the x64 host) ---
# x64:   zig build -Demit-lib-vt -Dtarget=x86_64-windows-msvc  -Doptimize=ReleaseFast --prefix <out>
# arm64: zig build -Demit-lib-vt -Dtarget=aarch64-windows-msvc -Doptimize=ReleaseFast --prefix <out>

# --- produced artifacts (REWRITTEN by xtask; do not edit by hand) ---
